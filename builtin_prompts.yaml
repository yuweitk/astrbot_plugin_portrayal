- __template_key: default
  command: 画像
  content: |
    请分析该群友的性格, 明确优点和缺点, 二者权重均衡, 不刻意褒贬；
    1. 输出全面的性格标签, 同时包含优势标签与缺点标签, 覆盖核心性格维度；
    2. 分析过程分“优势分析”“缺点分析”两部分,
    每部分均需结合聊天记录具体内容作为支撑, 逻辑清晰；
    3. 给出简短的“相处建议”, 说明如何与该群友更顺畅沟通；
    4. 整体语气中立客观,
    不美化缺点、不夸大优势,
    表述平实自然

- __template_key: default
  command: 正画像
  content: |
    请基于该群友的聊天记录，对其进行【优势导向】的人格画像分析：
    1. 只聚焦性格中的正向特质、潜在优点与讨喜之处，
    允许适度放大亮点，但必须有聊天内容作为依据，避免空洞吹捧；
    2. 从性格、情绪模式、思维方式、社交风格等多个维度提炼优势标签，
    覆盖其“为什么让人舒服 / 值得喜欢”；
    3. 分模块输出，如“性格优势”“相处价值”“隐藏闪光点”，
    逻辑清晰、层次分明；
    4. 语言风格温和、真诚、有共鸣，
    像是一个非常懂TA的人在认真肯定TA，
    而不是官方评价

- __template_key: default
  command: 负画像
  content: |
    请基于该群友的聊天记录，对其进行【缺点导向】的人格拆解分析：
    1. 只聚焦性格中的问题面、局限性与令人不适的行为模式，
    允许使用犀利、冷静甚至略带刻薄的表达，
    但所有判断必须严格基于聊天记录，有明确行为支撑；
    2. 从情绪稳定性、认知偏差、社交习惯、自我认知等维度提炼缺点标签，
    重点分析其“为什么容易让人累 / 难相处 / 产生摩擦”；
    3. 分模块输出，如“核心性格缺陷”“高频问题模式”“对他人的负面影响”，
    逻辑清晰，层层递进；
    4. 语气偏理性审判型，
    像是在做精准的人格解剖，
    而非情绪宣泄，避免无意义辱骂

- __template_key: default
  command: 克隆人格
  content: |
    请基于该群友的聊天记录, 生成一份可直接用于大模型“人格克隆”的系统提示词。
    要求如下：
    1. 必须同时还原其优势与缺点, 不得只保留讨喜特质；
    2. 明确写出说话风格、情绪模式、价值倾向、社交边界、常见行为习惯；
    3. 给出“高频表达特征”（如语气词、句式偏好、节奏长短、是否直球）；
    4. 给出“触发条件与反应模式”，例如在被质疑、被夸奖、被冒犯时的典型反应；
    5. 给出“禁止项”，明确哪些行为会明显偏离该人格；
    6. 最终输出只保留可复制的纯文本提示词正文，不要额外解释，不要代码块，不要Markdown格式。


- __template_key: default
  command: 找对象
  content: |
    你是一位资深红娘，擅长基于聊天记录，通过语言行为分析为用户从而推荐最契合的伴侣类型。
    ## 先简要提取性格画像，参考以下维度提取特征
    1. 先确定真实性别，并简要给出依据。
    1. **核心性格**：内向/外向、情绪稳定性、决策风格（理性/感性）
    2. **表达模式**：主动发起话题还是被动回应、喜欢倾诉还是倾听、冲突处理方式
    3. **兴趣光谱**：高频话题、知识领域、娱乐偏好、生活仪式感
    4. **价值观倾向**：对事业、家庭、金钱、自由、承诺的看法（从对话中推断）
    5. **情感需求**：被认可、被照顾、被理解、被陪伴、被激励等需求的优先级
    6. **沟通雷区**：容易反感的表达方式、话题禁忌、情绪触发点
    ## 第二阶段：匹配推荐
    基于画像，请给出以下输出：
    ### 1. 最佳匹配类型
    - **性格互补型** vs **性格相似型**：哪种更适合此人？说明理由
    - **推荐伴侣画像**：描述最适合的伴侣特质
    - **具体场景举例**：描述一段两人会自然聊起来的日常对话场景
    ### 2. 次优匹配类型
    - 列出 1-2 种"也可以考虑"的类型，说明适配点与潜在摩擦点
    ### 3. 避雷建议
    - 列出 2-3 种明显不合适的类型，指出冲突根源
    - 给出"如果好友正在接触这类人，需要警惕的信号"
    ### 4. 行动建议
    - 给好友本人的 2-3 条自我提升建议（帮助 ta 遇到更好的人）
    - 给牵线人的 2-3 条实操建议（如何在现实中帮 ta 筛选/引荐）
    - 给出一段可以直接发给潜在匹配对象的\"介绍语
